<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta charset="utf-8">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--pink-1:#ff6aa6;
--pink-2:#ff89c7;
--glass: rgba(255,255,255,0.06);
}

html,body{
height:100%;
margin:0;
}

body{
background:#000;
color:white;
font-family:"Baloo 2",-apple-system,system-ui;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.player{
width:100%;
max-width:420px;
height:100vh;
padding:48px 20px 36px 20px;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
}

.glow{
position:absolute;
top:18%;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:360px;
height:40%;
border-radius:30px;
filter:blur(28px);
background:
radial-gradient(circle at 40% 30%, rgba(255,110,160,0.16), transparent 50%),
radial-gradient(circle at 70% 70%, rgba(255,90,150,0.09), transparent 45%);
pointer-events:none;
}

.stars{
position:absolute;
inset:0;
pointer-events:none;
}

.star{
position:absolute;
width:6px;
height:6px;
background:var(--pink-1);
border-radius:50%;
box-shadow:0 0 10px rgba(255,100,160,0.9);
animation:starPulse linear infinite;
}

@keyframes starPulse{
0%{transform:scale(.6);opacity:.6;}
50%{transform:scale(1.2);opacity:1;}
100%{transform:scale(.6);opacity:.6;}
}

.album{
width:75vw;
max-width:320px;
aspect-ratio:1/1;
border-radius:22px;
overflow:hidden;
background:var(--glass);
box-shadow:0 20px 40px rgba(0,0,0,.55);
transform:perspective(1200px) rotateX(6deg) translateY(6px);
}

.album img{
width:100%;
height:100%;
object-fit:cover;
}

.song{
margin-top:26px;
text-align:center;
}

.title{
font-size:20px;
font-weight:700;
}

.artist{
color:#f3cfe0;
font-size:14px;
}

.progress-wrap{
width:84%;
margin-top:28px;
}

.progress{
position:relative;
width:100%;
height:14px;
border-radius:10px;
background:rgba(255,255,255,.06);
overflow:hidden;
}

.fill{
position:absolute;
left:0;
top:0;
bottom:0;
width:0%;
background:linear-gradient(90deg,#ff8cc2,#ff5aa0);
}

.fill::before{
content:"";
position:absolute;
width:300%;
height:200%;
background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 28'><path d='M0 12 C18 3 36 18 60 12 C84 6 102 18 120 12 V28 H0 Z' fill='%23ffd0e6'/></svg>");
background-repeat:repeat-x;
background-size:160px 60px;
opacity:.3;
animation:waveMove 2s linear infinite;
}

@keyframes waveMove{
0%{transform:translateX(0);}
100%{transform:translateX(-160px);}
}

.time{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:6px;
color:#ccc;
}

.controls{
margin-top:34px;
display:flex;
align-items:center;
justify-content:center;
gap:46px;
}

.btn{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
background:none;
border:none;
}

.icon{
width:34px;
height:34px;
}

.play-btn{
width:74px;
height:74px;
display:flex;
align-items:center;
justify-content:center;
background:none;
border:none;
}

.playicon{
width:60px;
height:60px;
}

</style>
</head>

<body>

<div class="player">

<div class="glow"></div>
<div class="stars" id="stars"></div>

<div class="album">
<img src="avatar.gif">
</div>

<div class="song">
<div class="title" id="title">I Just Threw Out the Love of my Dreams</div>
<div class="artist" id="artist">Weezer</div>
</div>

<div class="progress-wrap">
<div class="progress" id="progressBar">
<div class="fill" id="fill"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

<div class="controls">

<button class="btn" onclick="back10()">
<img src="back.png" class="icon">
</button>

<button class="play-btn" onclick="togglePlay()">
<img id="playIcon" src="play.png" class="playicon">
</button>

<button class="btn" onclick="forward10()">
<img src="forward.png" class="icon">
</button>

</div>

<audio id="audio" src="song.mp3"></audio>

</div>

<script>

const audio=document.getElementById("audio")
const fill=document.getElementById("fill")
const current=document.getElementById("current")
const duration=document.getElementById("duration")
const playIcon=document.getElementById("playIcon")

function formatTime(t){
let m=Math.floor(t/60)
let s=Math.floor(t%60)
if(s<10)s="0"+s
return m+":"+s
}

audio.onloadedmetadata=()=>{
duration.textContent=formatTime(audio.duration)
}

audio.ontimeupdate=()=>{
let p=(audio.currentTime/audio.duration)*100
fill.style.width=p+"%"
current.textContent=formatTime(audio.currentTime)
}

function togglePlay(){

if(audio.paused){

audio.play()
playIcon.src="pause.png"

}else{

audio.pause()
playIcon.src="play.png"

}

}

function back10(){
audio.currentTime=Math.max(0,audio.currentTime-10)
}

function forward10(){
audio.currentTime=Math.min(audio.duration,audio.currentTime+10)
}

document.getElementById("progressBar").onclick=(e)=>{
const rect=e.target.getBoundingClientRect()
const percent=(e.clientX-rect.left)/rect.width
audio.currentTime=audio.duration*percent
}

const starContainer=document.getElementById("stars")

for(let i=0;i<26;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*80+"%"
star.style.animationDuration=(2+Math.random()*3)+"s"
starContainer.appendChild(star)
}

</script>

</body>
</html>
